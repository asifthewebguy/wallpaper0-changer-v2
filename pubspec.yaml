name: wallpaper_changer
description: Cross-platform wallpaper changer — Windows, Linux, macOS
publish_to: none
version: 2.0.0-beta.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  window_manager: ^0.4.3
  tray_manager: ^0.2.3
  dio: ^5.4.3+1
  cached_network_image: ^3.3.1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  local_notifier: ^0.1.6
  app_links: ^6.1.1
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
